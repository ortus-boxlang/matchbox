name: Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: matchbox-linux-x64
            asset_name: matchbox-linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: matchbox-macos-x64
            asset_name: matchbox-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: matchbox-macos-arm64
            asset_name: matchbox-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: matchbox-windows-x64
            asset_name: matchbox-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run Tests
        run: cargo test --target ${{ matrix.target }}

      - name: Prepare Binary
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/matchbox.exe dist/${{ matrix.asset_name }}
          else
            cp target/${{ matrix.target }}/release/matchbox dist/${{ matrix.asset_name }}
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.asset_name }}

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep "^version =" Cargo.toml | head -1 | cut -d '"' -f 2)
          echo "VERSION=v$VERSION" >> $GITHUB_OUTPUT

      - name: Extract Changelog
        id: extract_changelog
        run: |
          # Extract content between [Unreleased] and the next ## heading
          # Sed range: /start/,/end/ but we need to exclude the markers
          sed -n '/## \[Unreleased\]/,/## /p' CHANGELOG.md | sed '1d;$d' > release_notes.md
          echo "BODY_PATH=release_notes.md" >> $GITHUB_OUTPUT

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten Artifacts
        run: |
          mkdir -p release-assets
          find dist -type f -exec cp {} release-assets/ \;
          ls -R release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          body_path: release_notes.md
          files: release-assets/*
          generate_release_notes: false
          draft: false
          prerelease: false
