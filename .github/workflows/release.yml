name: Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run Tests
        run: cargo test

  build-stubs:
    name: Build Stubs - ${{ matrix.os }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            targets: x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu, wasm32-wasip1
          - os: macos-latest
            targets: x86_64-apple-darwin, aarch64-apple-darwin
          - os: windows-latest
            targets: x86_64-pc-windows-msvc, aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}
      
      - name: Build Stubs
        shell: bash
        run: |
          mkdir -p stubs-out
          ROOT_DIR=$(pwd)
          cd crates/matchbox-runner
          IFS=', ' read -r -a TGS <<< "${{ matrix.targets }}"
          for target in "${TGS[@]}"; do
            echo "Building stub for $target..."
            cargo build --release --target "$target"
            
            # Determine source filename
            SRC_NAME="matchbox_runner"
            if [[ "$target" == *"windows"* ]]; then SRC_NAME="matchbox_runner.exe"; fi
            if [[ "$target" == *"wasm"* ]]; then SRC_NAME="matchbox_runner.wasm"; fi
            
            # Determine destination filename
            DEST_NAME="runner_stub_$target"
            if [[ "$target" == *"windows"* ]]; then DEST_NAME="$DEST_NAME.exe"; fi
            if [[ "$target" == *"wasm"* ]]; then DEST_NAME="runner_stub_wasip1.wasm"; fi
            
            cp "target/$target/release/$SRC_NAME" "$ROOT_DIR/stubs-out/$DEST_NAME"
          done

      - name: Upload Stubs
        uses: actions/upload-artifact@v4
        with:
          name: stubs-${{ matrix.os }}
          path: stubs-out/*

  aggregate-stubs:
    name: Aggregate All Stubs
    needs: build-stubs
    runs-on: ubuntu-latest
    steps:
      - name: Download All Stubs
        uses: actions/download-artifact@v4
        with:
          path: all-stubs
          merge-multiple: true
      
      - name: Show stubs
        run: ls -R all-stubs

      - name: Upload Aggregated Stubs
        uses: actions/upload-artifact@v4
        with:
          name: aggregated-stubs
          path: all-stubs/*

  build-clis:
    name: Build Fat CLI - ${{ matrix.os }}
    needs: aggregate-stubs
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Download Aggregated Stubs
        uses: actions/download-artifact@v4
        with:
          name: aggregated-stubs
          path: stubs

      - name: Build Fat CLI
        run: cargo build --release --features cross-compile

      - name: Prepare Artifact
        shell: bash
        run: |
          mkdir -p dist
          OS_NAME="linux"
          if [[ "${{ matrix.os }}" == *"macos"* ]]; then OS_NAME="macos"; fi
          
          cp target/release/matchbox dist/matchbox-$OS_NAME-fat
      
      - name: Upload Fat CLI
        uses: actions/upload-artifact@v4
        with:
          name: matchbox-${{ matrix.os }}-fat
          path: dist/*

  publish:
    name: Publish Release
    needs: build-clis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep "^version =" Cargo.toml | head -1 | cut -d '"' -f 2)
          echo "VERSION=v$VERSION" >> $GITHUB_OUTPUT

      - name: Extract Changelog
        id: extract_changelog
        run: |
          # Extract content between [Unreleased] and the next ## heading
          sed -n '/## \[Unreleased\]/,/## /p' CHANGELOG.md | sed '1d;$d' > release_notes.md
          echo "BODY_PATH=release_notes.md" >> $GITHUB_OUTPUT

      - name: Download Fat CLIs
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          body_path: release_notes.md
          files: release-assets/*
          generate_release_notes: false
          draft: false
          prerelease: false
