name: Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, wasm32-wasip1
      - name: Install wasm-bindgen-cli
        shell: bash
        run: |
          VERSION="0.2.114"
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            URL="https://github.com/rustwasm/wasm-bindgen/releases/download/$VERSION/wasm-bindgen-$VERSION-x86_64-unknown-linux-musl.tar.gz"
            DIR="wasm-bindgen-$VERSION-x86_64-unknown-linux-musl"
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            # Check architecture
            ARCH=$(uname -m)
            if [[ "$ARCH" == "arm64" ]]; then
              URL="https://github.com/rustwasm/wasm-bindgen/releases/download/$VERSION/wasm-bindgen-$VERSION-aarch64-apple-darwin.tar.gz"
              DIR="wasm-bindgen-$VERSION-aarch64-apple-darwin"
            else
              URL="https://github.com/rustwasm/wasm-bindgen/releases/download/$VERSION/wasm-bindgen-$VERSION-x86_64-apple-darwin.tar.gz"
              DIR="wasm-bindgen-$VERSION-x86_64-apple-darwin"
            fi
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            URL="https://github.com/rustwasm/wasm-bindgen/releases/download/$VERSION/wasm-bindgen-$VERSION-x86_64-pc-windows-msvc.tar.gz"
            DIR="wasm-bindgen-$VERSION-x86_64-pc-windows-msvc"
          fi
          
          echo "Downloading wasm-bindgen from $URL"
          curl -L "$URL" | tar -xz
          echo "$(pwd)/$DIR" >> $GITHUB_PATH
      - name: Setup Firefox
        if: matrix.os == 'ubuntu-latest'
        uses: browser-actions/setup-firefox@v1
      - name: Install Browser Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          # Ensure basic browser dependencies are met
          sudo apt-get install -y libdbus-glib-1-2
          # Use Playwright to install all system dependencies for Firefox
          npx playwright install-deps firefox
      - name: Build Web Runner Stub (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p stubs
          cargo build --manifest-path crates/matchbox-runner/Cargo.toml --release --target wasm32-unknown-unknown --features js
          cp crates/matchbox-runner/target/wasm32-unknown-unknown/release/matchbox_runner.wasm stubs/runner_stub_wasm32-unknown-unknown.wasm
          test -s stubs/runner_stub_wasm32-unknown-unknown.wasm
      - name: Run Tests
        run: cargo test

  build-stubs:
    name: Build Stubs - ${{ matrix.os }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            targets: x86_64-unknown-linux-gnu, i686-unknown-linux-gnu, wasm32-wasip1, wasm32-unknown-unknown
            tag: linux-x86
          - os: ubuntu-latest
            targets: aarch64-unknown-linux-gnu, armv7-unknown-linux-gnueabihf
            tag: linux-arm
          - os: macos-latest
            targets: x86_64-apple-darwin, aarch64-apple-darwin
            tag: macos
          - os: windows-latest
            targets: x86_64-pc-windows-msvc, aarch64-pc-windows-msvc, x86_64-pc-windows-gnu
            tag: windows
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}, wasm32-unknown-unknown, wasm32-wasip1
      
      - name: Install Cross-Compilers (Linux ARM)
        if: matrix.tag == 'linux-arm'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf
          version: 1.0

      - name: Add i386 Architecture
        if: matrix.tag == 'linux-x86'
        run: sudo dpkg --add-architecture i386

      - name: Install Cross-Compilers (Linux x86)
        if: matrix.tag == 'linux-x86'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: gcc-multilib libc6-dev-i386
          version: 1.0

      - name: Build Stubs
        shell: bash
        run: |
          mkdir -p stubs-out
          ROOT_DIR=$(pwd)
          cd crates/matchbox-runner
          IFS=', ' read -r -a TGS <<< "${{ matrix.targets }}"
          for target in "${TGS[@]}"; do
            echo "Building stub for $target..."
            
            # Setup linker for cross-compilation
            CMD="cargo build --release --target $target"
            if [[ "$target" == "aarch64-unknown-linux-gnu" ]]; then
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
            elif [[ "$target" == "armv7-unknown-linux-gnueabihf" ]]; then
              export CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc
            elif [[ "$target" == "wasm32-unknown-unknown" ]]; then
              CMD="$CMD --features js"
            fi

            $CMD

            # Determine source filename
            SRC_NAME="matchbox_runner"
            if [[ "$target" == *"windows"* ]]; then SRC_NAME="matchbox_runner.exe"; fi
            if [[ "$target" == *"wasm"* ]]; then SRC_NAME="matchbox_runner.wasm"; fi

            # Determine destination filename (wasm targets need explicit names to avoid collisions)
            DEST_NAME="runner_stub_$target"
            if [[ "$target" == *"windows"* ]]; then DEST_NAME="${DEST_NAME}.exe"
            elif [[ "$target" == "wasm32-wasip1" ]]; then DEST_NAME="runner_stub_wasip1.wasm"
            elif [[ "$target" == *"wasm"* ]]; then DEST_NAME="${DEST_NAME}.wasm"
            fi

            cp "target/$target/release/$SRC_NAME" "$ROOT_DIR/stubs-out/$DEST_NAME"
          done

      - name: Upload Stubs
        uses: actions/upload-artifact@v4
        with:
          name: stubs-${{ matrix.tag }}
          path: stubs-out/*

  build-esp32-stubs:
    name: Build ESP32 Stubs
    needs: test
    runs-on: ubuntu-latest
    container:
      # espressif/idf-rust: all chip targets, Rust + ESP-IDF pre-installed.
      # Tag format: espressif/idf-rust:<chips>_<rust_ver> — update when newer versions appear on Docker Hub.
      image: espressif/idf-rust:all_1.92.0.0
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Build ESP32 Stubs
        env:
          BOXLANG_BYTECODE_PATH: ""
          # Point rustup/cargo at the esp user's pre-installed toolchain directories.
          # Running as root sets HOME=/github/home, so RUSTUP_HOME/CARGO_HOME would
          # default to empty paths and rustup can't find the 'esp' toolchain.
          RUSTUP_HOME: /home/esp/.rustup
          CARGO_HOME: /home/esp/.cargo
        shell: bash
        run: |
          mkdir -p stubs-out
          cd crates/matchbox-esp32-runner
          # rust-toolchain.toml pins channel = "esp", so cargo auto-selects the right toolchain
          cargo build --release --target xtensa-esp32-espidf
          cp target/xtensa-esp32-espidf/release/matchbox-esp32-runner ../../stubs-out/runner_stub_esp32.elf

          cargo build --release --target xtensa-esp32s3-espidf
          cp target/xtensa-esp32s3-espidf/release/matchbox-esp32-runner ../../stubs-out/runner_stub_esp32s3.elf

          cargo build --release --target riscv32imc-esp-espidf
          cp target/riscv32imc-esp-espidf/release/matchbox-esp32-runner ../../stubs-out/runner_stub_esp32c3.elf

          for stub in runner_stub_esp32.elf runner_stub_esp32s3.elf runner_stub_esp32c3.elf; do
            test -s "../../stubs-out/$stub" || { echo "Stub $stub is empty"; exit 1; }
          done

      - name: Upload ESP32 Stubs
        uses: actions/upload-artifact@v4
        with:
          name: stubs-esp32
          path: stubs-out/*

  esp32-fusion-smoke:
    name: ESP32 Fusion Smoke
    needs: test
    runs-on: ubuntu-latest
    container:
      image: espressif/idf-rust:all_1.92.0.0
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Setup ESP-IDF Path
        shell: bash
        run: |
          if [[ -z "${IDF_PATH:-}" ]]; then
            for candidate in /opt/esp/idf /opt/esp-idf /home/esp/esp-idf /esp-idf; do
              if [[ -f "$candidate/tools/cmake/toolchain-esp32s3.cmake" ]]; then
                echo "IDF_PATH=$candidate" >> $GITHUB_ENV
                echo "Detected IDF_PATH at $candidate"
                break
              fi
            done
          fi

      - name: Build MatchBox host CLI
        env:
          RUSTUP_HOME: /home/esp/.rustup
          CARGO_HOME: /home/esp/.cargo
        shell: bash
        run: cargo build --release

      - name: Build ESP32 fusion example
        env:
          RUSTUP_HOME: /home/esp/.rustup
          CARGO_HOME: /home/esp/.cargo
          RUSTUP_TOOLCHAIN: esp
          ESP_IDF_TOOLS_INSTALL_DIR: fromenv
        shell: bash
        run: |
          source "$IDF_PATH/export.sh"
          ./target/release/matchbox \
            docs/examples/native_fusion/app.bxs \
            --target esp32 \
            --chip esp32s3

          test -s target/fusion/app/target/xtensa-esp32s3-espidf/release/fusion_build \
            || { echo "ESP32 fusion smoke artifact is missing or empty"; exit 1; }

  aggregate-stubs:
    name: Aggregate All Stubs
    needs: [build-stubs, build-esp32-stubs, esp32-fusion-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Stubs
        uses: actions/download-artifact@v4
        with:
          path: all-stubs
          merge-multiple: true
      
      - name: Show stubs
        run: ls -R all-stubs

      - name: Upload Aggregated Stubs
        uses: actions/upload-artifact@v4
        with:
          name: aggregated-stubs
          path: all-stubs/*

  build-clis:
    name: Build Fat CLI - ${{ matrix.target }}
    needs: aggregate-stubs
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            output_name: matchbox-linux-x64
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            output_name: matchbox-linux-x86
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            output_name: matchbox-linux-arm64
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            output_name: matchbox-linux-armv7
          - os: macos-latest
            target: x86_64-apple-darwin
            output_name: matchbox-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            output_name: matchbox-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            output_name: matchbox-windows-x64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            output_name: matchbox-windows-arm64.exe

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}, wasm32-unknown-unknown, wasm32-wasip1
      
      - name: Install Cross-Compilers (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu' || matrix.target == 'armv7-unknown-linux-gnueabihf'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf
          version: 1.0

      - name: Add i386 Architecture
        if: matrix.target == 'i686-unknown-linux-gnu'
        run: sudo dpkg --add-architecture i386

      - name: Install Cross-Compilers (Linux x86)
        if: matrix.target == 'i686-unknown-linux-gnu'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: gcc-multilib libc6-dev-i386
          version: 1.0

      - name: Download Aggregated Stubs
        uses: actions/download-artifact@v4
        with:
          name: aggregated-stubs
          path: stubs

      - name: Build All CLIs
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          elif [[ "${{ matrix.target }}" == "armv7-unknown-linux-gnueabihf" ]]; then
            export CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc
          fi
          
          # 1. Fat CLI (with cross-compile)
          cargo build --release --features cross-compile --target ${{ matrix.target }}
          
          # 2. Slim CLI (no cross-compile)
          cargo build --release --target ${{ matrix.target }}
          
          # 3. Server CLI (standalone)
          cargo build --release -p matchbox_server --target ${{ matrix.target }}

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p dist
          EXT=""
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then EXT=".exe"; fi
          
          # 1. Fat CLI
          cp "target/${{ matrix.target }}/release/matchbox$EXT" "dist/${{ matrix.output_name }}"
          
          # 2. Slim CLI
          SLIM_NAME=$(echo "${{ matrix.output_name }}" | sed "s/matchbox/matchbox-slim/")
          cp "target/${{ matrix.target }}/release/matchbox$EXT" "dist/$SLIM_NAME"
          
          # 3. Server CLI
          SERVER_NAME=$(echo "${{ matrix.output_name }}" | sed "s/matchbox/matchbox-server/")
          cp "target/${{ matrix.target }}/release/matchbox_server$EXT" "dist/$SERVER_NAME"
      
      - name: Upload Fat CLI
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: dist/*

  publish:
    name: Publish Release
    needs: build-clis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep "^version =" Cargo.toml | head -1 | cut -d '"' -f 2)
          echo "VERSION=v$VERSION" >> $GITHUB_OUTPUT

      - name: Extract Changelog
        id: extract_changelog
        run: |
          # Extract content between [Unreleased] and the next ## heading
          sed -n '/## \[Unreleased\]/,/## /p' CHANGELOG.md | sed '1d;$d' > release_notes.md
          echo "BODY_PATH=release_notes.md" >> $GITHUB_OUTPUT

      - name: Download Fat CLIs
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          body_path: release_notes.md
          files: release-assets/*
          generate_release_notes: false
          draft: false
          prerelease: false
