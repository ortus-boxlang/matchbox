name: Snapshot

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: matchbox-linux-x64-snapshot
            asset_name: matchbox-linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: matchbox-macos-x64-snapshot
            asset_name: matchbox-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: matchbox-macos-arm64-snapshot
            asset_name: matchbox-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: matchbox-windows-x64-snapshot
            asset_name: matchbox-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Binary
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/matchbox.exe dist/${{ matrix.asset_name }}
          else
            cp target/${{ matrix.target }}/release/matchbox dist/${{ matrix.asset_name }}
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.asset_name }}

  publish:
    name: Publish Snapshot
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten Artifacts
        run: |
          mkdir -p release-assets
          find dist -type f -exec cp {} release-assets/ \;
          ls -R release-assets/

      - name: Update Snapshot Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: snapshot
          name: "Snapshot Build"
          body: "This is a rolling snapshot build of the latest master branch."
          files: release-assets/*
          draft: false
          prerelease: true
          make_latest: false
