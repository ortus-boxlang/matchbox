name: Snapshot

on:
  push:
    branches:
      - develop

permissions:
  contents: write

jobs:
  test:
    name: Test - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run Tests
        run: cargo test

  build-stubs:
    name: Build Stubs - ${{ matrix.os }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            targets: x86_64-unknown-linux-gnu, i686-unknown-linux-gnu, wasm32-wasip1, wasm32-unknown-unknown
            tag: linux-x86
          - os: ubuntu-latest
            targets: aarch64-unknown-linux-gnu, armv7-unknown-linux-gnueabihf
            tag: linux-arm
          - os: macos-latest
            targets: x86_64-apple-darwin, aarch64-apple-darwin
            tag: macos
          - os: windows-latest
            targets: x86_64-pc-windows-msvc, aarch64-pc-windows-msvc, x86_64-pc-windows-gnu
            tag: windows
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}
      
      - name: Install Cross-Compilers (Linux ARM)
        if: matrix.tag == 'linux-arm'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf
          version: 1.0

      - name: Add i386 Architecture
        if: matrix.tag == 'linux-x86'
        run: sudo dpkg --add-architecture i386

      - name: Install Cross-Compilers (Linux x86)
        if: matrix.tag == 'linux-x86'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: gcc-multilib libc6-dev-i386
          version: 1.0

      - name: Build Stubs
        shell: bash
        run: |
          mkdir -p stubs-out
          ROOT_DIR=$(pwd)
          cd crates/matchbox-runner
          IFS=', ' read -r -a TGS <<< "${{ matrix.targets }}"
          for target in "${TGS[@]}"; do
            echo "Building stub for $target..."
            
            # Setup linker for cross-compilation
            CMD="cargo build --release --target $target"
            if [[ "$target" == "aarch64-unknown-linux-gnu" ]]; then
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
            elif [[ "$target" == "armv7-unknown-linux-gnueabihf" ]]; then
              export CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc
            elif [[ "$target" == "wasm32-unknown-unknown" ]]; then
              CMD="$CMD --features js"
            fi

            $CMD

            # Determine source filename
            SRC_NAME="matchbox_runner"
            if [[ "$target" == *"windows"* ]]; then SRC_NAME="matchbox_runner.exe"; fi
            if [[ "$target" == *"wasm"* ]]; then SRC_NAME="matchbox_runner.wasm"; fi

            # Determine destination filename (wasm targets need explicit names to avoid collisions)
            DEST_NAME="runner_stub_$target"
            if [[ "$target" == *"windows"* ]]; then DEST_NAME="${DEST_NAME}.exe"
            elif [[ "$target" == "wasm32-wasip1" ]]; then DEST_NAME="runner_stub_wasip1.wasm"
            elif [[ "$target" == *"wasm"* ]]; then DEST_NAME="${DEST_NAME}.wasm"
            fi

            cp "target/$target/release/$SRC_NAME" "$ROOT_DIR/stubs-out/$DEST_NAME"
          done

      - name: Upload Stubs
        uses: actions/upload-artifact@v4
        with:
          name: stubs-${{ matrix.tag }}
          path: stubs-out/*

  build-esp32-stubs:
    name: Build ESP32 Stubs
    needs: test
    runs-on: ubuntu-latest
    container:
      # espressif/idf-rust: all chip targets, Rust + ESP-IDF pre-installed.
      # Tag format: espressif/idf-rust:<chips>_<rust_ver> — update when newer versions appear on Docker Hub.
      image: espressif/idf-rust:all_1.92.0.0
    steps:
      - uses: actions/checkout@v4
      - name: Build ESP32 Stubs
        env:
          BOXLANG_BYTECODE_PATH: ""
        shell: bash
        run: |
          mkdir -p stubs-out
          cd crates/matchbox-esp32-runner
          # rust-toolchain.toml pins channel = "esp", so cargo auto-selects the right toolchain
          cargo build --release --target xtensa-esp32-espidf
          cp target/xtensa-esp32-espidf/release/matchbox-esp32-runner ../../stubs-out/runner_stub_esp32.elf

          cargo build --release --target xtensa-esp32s3-espidf
          cp target/xtensa-esp32s3-espidf/release/matchbox-esp32-runner ../../stubs-out/runner_stub_esp32s3.elf

          cargo build --release --target riscv32imc-esp-espidf
          cp target/riscv32imc-esp-espidf/release/matchbox-esp32-runner ../../stubs-out/runner_stub_esp32c3.elf

      - name: Upload ESP32 Stubs
        uses: actions/upload-artifact@v4
        with:
          name: stubs-esp32
          path: stubs-out/*

  aggregate-stubs:
    name: Aggregate All Stubs
    needs: [build-stubs, build-esp32-stubs]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Stubs
        uses: actions/download-artifact@v4
        with:
          path: all-stubs
          merge-multiple: true
      
      - name: Show stubs
        run: ls -R all-stubs

      - name: Upload Aggregated Stubs
        uses: actions/upload-artifact@v4
        with:
          name: aggregated-stubs
          path: all-stubs/*

  build-clis:
    name: Build Fat CLI - ${{ matrix.target }}
    needs: aggregate-stubs
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            output_name: matchbox-linux-x64
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            output_name: matchbox-linux-x86
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            output_name: matchbox-linux-arm64
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            output_name: matchbox-linux-armv7
          - os: macos-latest
            target: x86_64-apple-darwin
            output_name: matchbox-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            output_name: matchbox-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            output_name: matchbox-windows-x64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            output_name: matchbox-windows-arm64.exe

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Install Cross-Compilers (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu' || matrix.target == 'armv7-unknown-linux-gnueabihf'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf
          version: 1.0

      - name: Add i386 Architecture
        if: matrix.target == 'i686-unknown-linux-gnu'
        run: sudo dpkg --add-architecture i386

      - name: Install Cross-Compilers (Linux x86)
        if: matrix.target == 'i686-unknown-linux-gnu'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: gcc-multilib libc6-dev-i386
          version: 1.0

      - name: Download Aggregated Stubs
        uses: actions/download-artifact@v4
        with:
          name: aggregated-stubs
          path: stubs

      - name: Build Fat CLI
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          elif [[ "${{ matrix.target }}" == "armv7-unknown-linux-gnueabihf" ]]; then
            export CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc
          fi
          cargo build --release --features cross-compile --target ${{ matrix.target }}

      - name: Prepare Artifact
        shell: bash
        run: |
          mkdir -p dist
          SRC_PATH="target/${{ matrix.target }}/release/matchbox"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then SRC_PATH="$SRC_PATH.exe"; fi
          cp "$SRC_PATH" "dist/${{ matrix.output_name }}"
      
      - name: Upload Fat CLI
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: dist/*

  publish:
    name: Publish Snapshot
    needs: build-clis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Fat CLIs
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Update Snapshot Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: snapshot
          name: "Snapshot Build"
          body: "This is a rolling snapshot build of the latest develop branch. These CLI binaries contain runner stubs for all platforms."
          files: release-assets/*
          draft: false
          prerelease: true
          make_latest: false
